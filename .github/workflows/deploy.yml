name: Deploy HireWalk

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Full Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 600s
          script: |
            set -e

            echo "====== STEP 1: Install System Packages ======"
            sudo yum install -y python3 python3-pip git mysql 2>/dev/null || true
            sudo amazon-linux-extras install nginx1 -y 2>/dev/null || true

            echo "====== STEP 2: Clone or Pull Repo ======"
            if [ -d "/home/ec2-user/hackathon-projecct" ]; then
            cd /home/ec2-user/hackathon-projecct
              git fetch origin
              git reset --hard origin/main
            else
              cd /home/ec2-user
              git clone https://github.com/Ranjit-08/hackathon-projecct.git
              cd hackathon-projecct
            fi

            echo "====== STEP 3: Write requirements.txt ======"
            cat > /home/ec2-user/hackathon-projecct/backend/requirements.txt << EOF
            flask==2.2.5
            flask-cors==3.0.10
            pymysql==1.1.0
            python-dotenv==0.21.1
            PyJWT==2.6.0
            bcrypt==4.0.1
            requests==2.28.2
            gunicorn==20.1.0
            Werkzeug==2.2.3
            EOF

            echo "====== STEP 4: Install Python Packages ======"
            pip3 install -r /home/ec2-user/hackathon-projecct/backend/requirements.txt --user -q

            echo "====== STEP 5: Create .env ======"
            cat > /home/ec2-user/hackathon-projecct/backend/.env << EOF
            DB_HOST=${{ secrets.DB_HOST }}
            DB_PORT=3306
            DB_NAME=walkin_platform
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            SMTP_HOST=smtp.gmail.com
            SMTP_PORT=587
            SMTP_USER=${{ secrets.SMTP_USER }}
            SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
            GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
            GROQ_MODEL=llama-3.3-70b-versatile
            DEBUG=False
            PORT=5000
            FRONTEND_URL=${{ secrets.CF_URL }}
            EOF

            echo "====== STEP 6: Init Database ======"
            mysql -h ${{ secrets.DB_HOST }} -u ${{ secrets.DB_USER }} -p${{ secrets.DB_PASSWORD }} walkin_platform < /home/ec2-user/hackathon-projecct/database/schema.sql 2>/dev/null || echo "Tables may already exist"

            echo "====== STEP 7: Fix Frontend API URL ======"
            CF_URL="${{ secrets.CF_URL }}"
            sed -i "s|http://YOUR_EC2_PUBLIC_IP/api|$CF_URL/api|g" \
              /home/ec2-user/hackathon-projecct/frontend/js/api.js
            echo "API URL set to: $CF_URL/api"
            echo "====== STEP 8: Deploy Frontend ======"
            sudo mkdir -p /var/www/walkin-frontend
            sudo cp -r /home/ec2-user/hackathon-projecct/frontend/* /var/www/walkin-frontend/
            sudo chown -R nginx:nginx /var/www/walkin-frontend

            echo "====== STEP 9: Setup Nginx ======"
            sudo sed -i '/^    server {/,/^    }/d' /etc/nginx/nginx.conf
            sudo bash -c 'cat > /etc/nginx/conf.d/walkin.conf << EOF
            server {
                listen 80;
                server_name _;
                location /api/ {
                    proxy_pass http://127.0.0.1:5000;
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_read_timeout 60s;
                }
                location / {
                    root /var/www/walkin-frontend;
                    index index.html;
                    try_files \$uri \$uri/ /index.html;
                }
            }
            EOF'

            echo "====== STEP 10: Setup Systemd Service ======"
            GUNICORN_PATH=$(find /home/ec2-user/.local/bin -name gunicorn 2>/dev/null | head -1)
            echo "Gunicorn: $GUNICORN_PATH"
            sudo bash -c "cat > /etc/systemd/system/walkin.service << EOF
            [Unit]
            Description=HireWalk API
            After=network.target

            [Service]
            User=ec2-user
            WorkingDirectory=/home/ec2-user/hackathon-projecct/backend
            ExecStart=$GUNICORN_PATH --workers 3 --bind 0.0.0.0:5000 app:app
            Restart=always
            RestartSec=5
            StandardOutput=journal
            StandardError=journal

            [Install]
            WantedBy=multi-user.target
            EOF"

            echo "====== STEP 11: Start Services ======"
            sudo systemctl daemon-reload
            sudo systemctl enable walkin
            sudo systemctl restart walkin
            sudo systemctl enable nginx
            sudo systemctl restart nginx

            echo "====== STEP 12: Health Check ======"
            sleep 5
            curl -s http://localhost:5000/api/health && echo " Backend OK" || echo " Backend FAILED"
            curl -s http://localhost/api/health && echo " Nginx OK" || echo " Nginx FAILED"
            echo "====== DEPLOY COMPLETE: http://$EC2_IP ======"